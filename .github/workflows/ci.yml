name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install Dependencies
        run: npm ci
      - name: Install Browser
        run: npx playwright install --with-deps chromium
      - name: Build App
        run: npm run build
      - name: Playwright E2E
        run: npm test
      - name: CI Guardrails
        run: npm run test:jest
      - name: Meta Progression Checks
        run: npm run meta:sim
      - name: Performance Smoke
        run: npm run perf:quick
      - name: Security Tests
        run: npm run test:security
      - name: Engine Unit Tests
        run: npm run test:engine
      - name: Typecheck
        run: npm run typecheck:all
      - name: High Severity Audit
        run: npm run audit:high
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            firebase-debug.log
            firestore-debug.log
          if-no-files-found: ignore

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
