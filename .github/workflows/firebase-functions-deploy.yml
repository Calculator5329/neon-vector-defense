name: Firebase Functions Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Require master ref
        env:
          DEPLOY_REF: ${{ github.ref }}
        run: |
          if [ "$DEPLOY_REF" != "refs/heads/master" ]; then
            echo "Manual deploy workflows must run from refs/heads/master; got $DEPLOY_REF." >&2
            exit 1
          fi
      - name: Deployment Audit Summary
        run: |
          BUILD_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          {
            echo "### Deployment audit"
            echo "- Ref: $GITHUB_REF"
            echo "- Commit SHA: $GITHUB_SHA"
            echo "- Build tag: $BUILD_TAG"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install Dependencies
        run: npm ci
      - name: Install Functions Dependencies
        run: npm --prefix functions ci
      - name: Install Browser
        run: npx playwright install --with-deps chromium
      - name: Build App
        run: npm run build
      - name: Playwright E2E
        run: npm test
      - name: Production Bundle E2E
        run: npm run test:e2e:prod
      - name: Build Functions
        run: npm --prefix functions run build
      - name: CI Guardrails
        run: npm run test:jest
      - name: Engine Unit Tests
        run: npm run test:engine
      - name: Typecheck
        run: npm run typecheck:all
      - name: Security Tests
        run: npm run test:security
      - name: High Severity Audit
        run: npm run audit:high
      - name: Prepare Firebase Credentials
        shell: bash
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test "$FIREBASE_PROJECT_ID" = "neon-vector-defense-7"
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-sa.json"
      - name: Deploy Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: npx firebase-tools deploy --only functions --project "$FIREBASE_PROJECT_ID" --non-interactive
