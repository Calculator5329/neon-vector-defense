name: Deep Checks

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Deep check suite
        required: true
        type: choice
        options:
          - quick-balance
          - full-balance
          - browser-perf
          - all
        default: quick-balance
  schedule:
    # Cheap balance drift smoke. Full balance simulation remains manual-only.
    - cron: '24 9 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'schedule' && 'quick-balance' || inputs.suite }}
  cancel-in-progress: true

jobs:
  deep:
    name: ${{ github.event_name == 'schedule' && 'quick-balance' || inputs.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEEP_SUITE: ${{ github.event_name == 'schedule' && 'quick-balance' || inputs.suite }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install Dependencies
        run: npm ci
      - name: Install Browser
        if: ${{ env.DEEP_SUITE == 'browser-perf' || env.DEEP_SUITE == 'all' }}
        run: npx playwright install --with-deps chromium
      - name: Quick Balance Simulation
        if: ${{ env.DEEP_SUITE == 'quick-balance' || env.DEEP_SUITE == 'all' }}
        run: npm run sim -- quick
      - name: Full Balance Simulation
        if: ${{ env.DEEP_SUITE == 'full-balance' || env.DEEP_SUITE == 'all' }}
        run: npm run sim
      - name: Browser Performance Harness
        if: ${{ env.DEEP_SUITE == 'browser-perf' || env.DEEP_SUITE == 'all' }}
        run: npm run build && npm run perf:browser
      - name: Upload deep-check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deep-check-artifacts-${{ env.DEEP_SUITE }}
          path: |
            playwright-report/
            test-results/
            public/balance-report.json
            public/tower-deep-dive-report.json
            public/tower-deep-dive-sims.csv
          if-no-files-found: ignore
