name: Firebase Hosting and Rules Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Hosting and Firestore Rules
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install Dependencies
        run: npm ci
      - name: Install Browser
        run: npx playwright install --with-deps chromium
      - name: Build App
        run: npm run build
      - name: Playwright E2E
        run: npm test
      - name: CI Guardrails
        run: npm run test:jest
      - name: Engine Unit Tests
        run: npm run test:engine
      - name: Typecheck
        run: npm run typecheck:all
      - name: Security Tests
        run: npm run test:security
      - name: High Severity Audit
        run: npm run audit:high
      - name: Prepare Firebase Credentials
        shell: bash
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test "$FIREBASE_PROJECT_ID" = "neon-vector-defense-7"
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-sa.json"
      - name: Deploy Hosting and Firestore Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: npx firebase-tools deploy --only hosting,firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID" --non-interactive
