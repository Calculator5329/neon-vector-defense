version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
    groups:
      functions-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
    groups:
      worker-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:45"
    groups:
      actions-minor-patch:
        update-types: [minor, patch]
